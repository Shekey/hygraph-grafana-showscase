global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production

scrape_configs:
  # OpenTelemetry metrics from collector
  - job_name: "otel-collector"
    static_configs:
      - targets: ["${OTEL_COLLECTOR_HOST}"]
    scrape_interval: 5s
    scrape_timeout: 5s
