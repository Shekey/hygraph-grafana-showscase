steps:
  # Build Docker image — public vars as --build-arg, secret via --secret mount (BuildKit)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          --build-arg NEXT_PUBLIC_HYGRAPH_CONTENT_ENDPOINT=${_HYGRAPH_ENDPOINT} \
          --build-arg NEXT_PUBLIC_HYGRAPH_ALWAYS_DRAFT=${_ALWAYS_DRAFT} \
          --build-arg NEXT_PUBLIC_SITE_URL=${_SITE_URL} \
          --build-arg NEXT_PUBLIC_SENTRY_DSN=${_SENTRY_DSN} \
          --secret id=sentry_auth_token,env=SENTRY_TOKEN \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/nextjs:$COMMIT_SHA \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/nextjs:latest \
          .
    secretEnv: ['SENTRY_TOKEN']

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/nextjs']

  # Deploy to Cloud Run — runtime secrets injected here
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/nextjs:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=3000'
      - '--memory=1Gi'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--allow-unauthenticated'
      - '--service-account=cloud-run-app@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-secrets=HYGRAPH_PREVIEW_TOKEN=HYGRAPH_PREVIEW_TOKEN:latest'
      - '--set-secrets=HYGRAPH_PREVIEW_SECRET=HYGRAPH_PREVIEW_SECRET:latest'
      - '--set-env-vars=NODE_ENV=production'

substitutions:
  _REGION: europe-west3
  _REPO: hygraph-showcase
  _SERVICE_NAME: hygraph-showcase
  _HYGRAPH_ENDPOINT: 'https://your-hygraph-endpoint'
  _ALWAYS_DRAFT: 'false'
  _SITE_URL: 'https://hygraph-showcase.run.app'
  _SENTRY_DSN: 'https://your-sentry-dsn'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/SENTRY_AUTH_TOKEN/versions/latest
      env: 'SENTRY_TOKEN'

options:
  logging: CLOUD_LOGGING_ONLY
