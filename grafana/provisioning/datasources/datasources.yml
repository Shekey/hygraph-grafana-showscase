apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: ${PROMETHEUS_URL}
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
    secureJsonData: {}

  - name: Cloud Logging
    type: stackdriver
    uid: cloud-logging
    isDefault: false
    jsonData:
      authenticationType: gce
      defaultProject: ${GCP_PROJECT_ID}
    secureJsonData: {}
