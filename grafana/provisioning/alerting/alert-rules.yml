apiVersion: 1

groups:
  - orgId: 1
    name: hygraph-showcase-alerts
    folder: alerts
    interval: 1m
    rules:
      # ============================================================
      # HTTP/Application Level Alerts
      # ============================================================

      - uid: high-5xx-error-rate
        title: High 5xx Error Rate
        condition: A
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "High 5xx error rate detected ({{ $value | humanizePercentage }})"
          description: |
            Error rate has exceeded 5% for the last 5 minutes.
            **Current rate:** {{ $value | humanizePercentage }}
            **Action:** Check error logs and recent deployments. Investigate root cause if rate continues to climb.
        labels:
          severity: critical
          component: http
          team: platform
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: >
                (
                  rate(http_server_duration_milliseconds_count{http_status_code=~"5.."}[5m])
                  /
                  rate(http_server_duration_milliseconds_count[5m])
                ) > 0.05
              instant: false
              range: true
              interval: ""
              datasource:
                type: prometheus
                uid: prometheus

      - uid: high-p95-latency
        title: High P95 Page Latency
        condition: A
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "High P95 page latency ({{ $value | humanizeDuration }})"
          description: |
            P95 page latency has exceeded 3 seconds for the last 5 minutes.
            **Current P95:** {{ $value | humanizeDuration }}
            **Action:** Check CloudRun performance, database query times, and external API latencies.
        labels:
          severity: warning
          component: performance
          team: platform
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: >
                histogram_quantile(0.95, sum by (le) (rate(page_request_duration_ms_bucket[5m]))) > 3000
              instant: false
              range: true
              interval: ""
              datasource:
                type: prometheus
                uid: prometheus

      - uid: page-latency-by-route
        title: High Latency on Specific Route
        condition: A
        noDataState: NoData
        execErrState: Alerting
        for: 10m
        annotations:
          summary: "Slow page load ({{ $value | humanizeDuration }})"
          description: |
            Page latency has exceeded 5 seconds for 10 minutes.
            **Current P95:** {{ $value | humanizeDuration }}
            **Action:** Profile data fetch and rendering. Check Hygraph query performance.
        labels:
          severity: warning
          component: performance
          team: frontend
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: >
                histogram_quantile(0.95, sum by (le, http_route) (rate(page_request_duration_ms_bucket[5m]))) > 5000
              instant: false
              range: true
              interval: ""
              datasource:
                type: prometheus
                uid: prometheus

      # ============================================================
      # Chat/AI Agent Alerts
      # ============================================================

      - uid: chat-high-error-rate
        title: High Chat Error Rate
        condition: A
        noDataState: NoData
        execErrState: Alerting
        for: 3m
        annotations:
          summary: "Chat service error rate high ({{ $value | humanizePercentage }})"
          description: |
            Chat API error rate has exceeded 10% for the last 3 minutes.
            **Current rate:** {{ $value | humanizePercentage }}
            **Action:** Check Vertex AI quota, authentication, or request payload issues.
        labels:
          severity: critical
          component: chat
          team: ai-platform
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 180
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: >
                (
                  rate(chat_requests_total{status="error"}[3m])
                  /
                  rate(chat_requests_total[3m])
                ) > 0.10
              instant: false
              range: true
              interval: ""
              datasource:
                type: prometheus
                uid: prometheus

      - uid: chat-max-rounds-exceeded
        title: Chat Conversation Exceeds Max Rounds
        condition: A
        noDataState: NoData
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Chat conversations hitting max rounds limit"
          description: |
            One or more chat conversations have reached the maximum rounds limit.
            **Count in 5m window:** {{ $value }}
            **Action:** Monitor user experience. Consider increasing max_rounds if needed.
        labels:
          severity: info
          component: chat
          team: ai-platform
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: >
                increase(chat_requests_total{status="max_rounds"}[5m]) > 0
              instant: false
              range: true
              interval: ""
              datasource:
                type: prometheus
                uid: prometheus

      - uid: chat-high-latency
        title: High Chat Response Latency
        condition: A
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Chat API response time high ({{ $value | humanizeDuration }})"
          description: |
            Chat API p95 response time has exceeded 10 seconds for 5 minutes.
            **Current P95:** {{ $value | humanizeDuration }}
            **Action:** Check Vertex AI latency, token generation, and network egress.
        labels:
          severity: warning
          component: chat
          team: ai-platform
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: >
                histogram_quantile(0.95, sum by (le) (rate(chat_response_duration_ms_bucket[5m]))) > 10000
              instant: false
              range: true
              interval: ""
              datasource:
                type: prometheus
                uid: prometheus

      # ============================================================
      # Web Vitals / User Experience Alerts
      # ============================================================

      - uid: web-vital-lcp-degradation
        title: LCP Degradation Detected
        condition: A
        noDataState: NoData
        execErrState: Alerting
        for: 10m
        annotations:
          summary: "LCP exceeds good threshold ({{ $value | humanizeDuration }})"
          description: |
            Largest Contentful Paint (LCP) has exceeded 2.5 seconds for 10 minutes.
            **Current P75:** {{ $value | humanizeDuration }}
            **Action:** Check image optimization, font loading, and server response times.
        labels:
          severity: warning
          component: web-vitals
          team: frontend
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: >
                histogram_quantile(0.75, sum by (le) (rate(web_vital_value_bucket{metric_name="LCP"}[5m]))) > 2500
              instant: false
              range: true
              interval: ""
              datasource:
                type: prometheus
                uid: prometheus

      # ============================================================
      # Service Health Alerts
      # ============================================================

      - uid: otel-collector-no-data
        title: No OTel Metrics Received
        condition: A
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "OTel metrics collection stopped"
          description: |
            No metric data received from the application for 2+ minutes.
            **Action:** Check Cloud Run service status, OTel collector health, and network connectivity.
        labels:
          severity: critical
          component: infrastructure
          team: platform
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: >
                increase(http_server_duration_milliseconds_count[2m]) == 0
              instant: false
              range: true
              interval: ""
              datasource:
                type: prometheus
                uid: prometheus

      - uid: zero-traffic-window
        title: No Application Traffic
        condition: A
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Application receiving no traffic"
          description: |
            No HTTP requests received in the last 5 minutes.
            **Action:** Check load balancer routing, DNS, and firewall rules. May be normal during maintenance.
        labels:
          severity: warning
          component: infrastructure
          team: platform
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              expr: >
                increase(http_server_duration_milliseconds_count[5m]) == 0
              instant: false
              range: true
              interval: ""
              datasource:
                type: prometheus
                uid: prometheus
