apiVersion: 1

groups:
  - orgId: 1
    name: hygraph-showcase-alerts
    interval: 1m
    rules:
      # ============================================================
      # HTTP/Application Level Alerts
      # ============================================================

      - uid: high-5xx-error-rate
        title: High 5xx Error Rate
        condition: C
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "High 5xx error rate detected ({{ $value | humanizePercentage }})"
          description: |
            Error rate has exceeded 5% for the last 5 minutes.
            **Current rate:** {{ $value | humanizePercentage }}
            **Environment:** {{ $labels.environment | default "all" }}
            **Action:** Check error logs and recent deployments. Investigate root cause if rate continues to climb. Review Cloud Run and backend service logs.
        labels:
          severity: critical
          component: http
          team: platform
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'rate(http_server_duration_milliseconds_count{http_status_code=~"5.."}[5m])'
              interval: ""
              refId: A
          - refId: B
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'rate(http_server_duration_milliseconds_count[5m])'
              interval: ""
              refId: B
          - refId: C
            queryType: ""
            expression: "B > 0 ? (A / B) : 0"
            reducer: last
            settings:
              mode: strict
            mathExpression: "B > 0 ? (A / B) : 0"

      - uid: high-p95-latency
        title: High P95 Page Latency
        condition: A
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "High P95 page latency ({{ $value | humanizeDuration }})"
          description: |
            P95 page latency has exceeded 3 seconds for the last 5 minutes.
            **Current P95:** {{ $value | humanizeDuration }}
            **Environment:** {{ $labels.environment }}
            **Route:** {{ $labels.http_route | default "All" }}
            **Action:** Check CloudRun performance, database query times, and external API latencies.
        labels:
          severity: warning
          component: performance
          team: platform
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'histogram_quantile(0.95, sum by (le, http_route, environment) (rate(page_request_duration_ms_bucket[5m]))) > 3000'
              interval: ""
              refId: A

      - uid: page-latency-by-route
        title: High Latency on Specific Route
        condition: A
        noDataState: NoData
        execErrState: Alerting
        for: 10m
        annotations:
          summary: "Slow page load on {{ $labels.http_route }} ({{ $value | humanizeDuration }})"
          description: |
            Page latency for **{{ $labels.http_route }}** has exceeded 5 seconds for 10 minutes.
            **Current P95:** {{ $value | humanizeDuration }}
            **Environment:** {{ $labels.environment }}
            **Action:** Profile this route's data fetch and rendering. Check Hygraph query performance and data loading.
        labels:
          severity: warning
          component: performance
          team: frontend
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'histogram_quantile(0.95, sum by (le, http_route, environment) (rate(page_request_duration_ms_bucket[5m]))) > 5000'
              interval: ""
              refId: A

      # ============================================================
      # Chat/AI Agent Alerts
      # ============================================================

      - uid: chat-high-error-rate
        title: High Chat Error Rate
        condition: C
        noDataState: NoData
        execErrState: Alerting
        for: 3m
        annotations:
          summary: "Chat service error rate high ({{ $value | humanizePercentage }})"
          description: |
            Chat API error rate has exceeded 10% for the last 3 minutes.
            **Current rate:** {{ $value | humanizePercentage }}
            **Environment:** {{ $labels.environment }}
            **Action:** Check Vertex AI quota, authentication, or request payload issues. Review /api/chat logs.
        labels:
          severity: critical
          component: chat
          team: ai-platform
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 180
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'rate(chat_requests_total{status="error"}[3m])'
              interval: ""
              refId: A
          - refId: B
            queryType: ""
            relativeTimeRange:
              from: 180
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'rate(chat_requests_total[3m])'
              interval: ""
              refId: B
          - refId: C
            queryType: ""
            expression: "B > 0 ? (A / B) : 0"
            reducer: last
            settings:
              mode: strict
            mathExpression: "B > 0 ? (A / B) : 0"

      - uid: chat-max-rounds-exceeded
        title: Chat Conversation Exceeds Max Rounds
        condition: A
        noDataState: NoData
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Chat conversations hitting max rounds limit"
          description: |
            One or more chat conversations have reached the maximum rounds limit.
            **Count in 5m window:** {{ $value }}
            **Environment:** {{ $labels.environment }}
            **Action:** Monitor user experience. Consider increasing max_rounds if legitimate use cases require longer conversations.
        labels:
          severity: info
          component: chat
          team: ai-platform
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'increase(chat_requests_total{status="max_rounds"}[5m]) > 0'
              interval: ""
              refId: A

      - uid: chat-high-latency
        title: High Chat Response Latency
        condition: A
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Chat API response time high ({{ $value | humanizeDuration }})"
          description: |
            Chat API p95 response time has exceeded 10 seconds for 5 minutes.
            **Current P95:** {{ $value | humanizeDuration }}
            **Status:** {{ $labels.status | default "all" }}
            **Action:** Check Vertex AI latency, token generation speed, and network egress. Consider token limits or prompt optimization.
        labels:
          severity: warning
          component: chat
          team: ai-platform
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'histogram_quantile(0.95, sum by (le, status) (rate(chat_response_duration_ms_bucket[5m]))) > 10000'
              interval: ""
              refId: A

      # ============================================================
      # Web Vitals / User Experience Alerts
      # ============================================================

      - uid: web-vital-lcp-degradation
        title: LCP Degradation Detected
        condition: A
        noDataState: NoData
        execErrState: Alerting
        for: 10m
        annotations:
          summary: "LCP exceeds good threshold ({{ $value | humanizeDuration }})"
          description: |
            Largest Contentful Paint (LCP) has exceeded 2.5 seconds for 10 minutes.
            **Current P75:** {{ $value | humanizeDuration }}
            **Route:** {{ $labels.route | default "all" }}
            **Environment:** {{ $labels.environment | default "all" }}
            **Action:** Check image optimization, font loading, and server response times. Profile with Lighthouse.
        labels:
          severity: warning
          component: web-vitals
          team: frontend
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'histogram_quantile(0.75, sum by (le, route, environment) (rate(web_vital_value_bucket{metric_name="LCP"}[5m]))) > 2500'
              interval: ""
              refId: A

      # ============================================================
      # Service Health Alerts
      # ============================================================

      - uid: otel-collector-no-data
        title: No OTel Metrics Received
        condition: A
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "OTel metrics collection stopped"
          description: |
            No metric data received from the application for 2+ minutes.
            **Action:** Check: 1) Is Cloud Run service running? 2) Is OTel collector healthy? 3) Is OTEL_EXPORTER_OTLP_ENDPOINT set correctly? 4) Check network connectivity.
        labels:
          severity: critical
          component: infrastructure
          team: platform
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'increase(http_server_duration_milliseconds_count[2m]) == 0'
              interval: ""
              refId: A

      - uid: zero-traffic-window
        title: No Application Traffic (5 min window)
        condition: A
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Application receiving no traffic"
          description: |
            No HTTP requests received in the last 5 minutes.
            **Environment:** {{ $labels.environment }}
            **Action:** Check load balancer routing, DNS, and firewall rules. Verify Cloud Run service is running and healthy. May be normal for low-traffic environments during maintenance.
        labels:
          severity: warning
          component: infrastructure
          team: platform
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'increase(http_server_duration_milliseconds_count[5m]) == 0'
              interval: ""
              refId: A
