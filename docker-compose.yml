version: "3.8"
services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    command: [--config=/etc/otel-collector-config.yaml]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4327:4317"   # OTLP gRPC receiver
      - "4328:4318"   # OTLP HTTP receiver
      - "9411:9411"   # Zipkin
      - "8890:8889"   # Prometheus metrics
    environment:
      - GOGC=80
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    build:
      context: .
      dockerfile: grafana/Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources/datasources-local.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - PROMETHEUS_URL=http://prometheus:9090
      - GCP_PROJECT_ID=unknown
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - ALERT_WEBHOOK_SECRET=test-secret-local
    depends_on:
      - prometheus

volumes:
  grafana-data:
