name: Deploy to Cloud Run

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: 'read'
  id-token: 'write'
  pull-requests: 'write'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine environment and service name
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "service=hygraph-showcase-dev" >> $GITHUB_OUTPUT
            echo "env_label=Preview (dev)" >> $GITHUB_OUTPUT
            echo "ingress=all" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "service=hygraph-showcase-prod" >> $GITHUB_OUTPUT
            echo "env_label=Production" >> $GITHUB_OUTPUT
            echo "ingress=internal" >> $GITHUB_OUTPUT
          else
            echo "service=hygraph-showcase-dev" >> $GITHUB_OUTPUT
            echo "env_label=Development" >> $GITHUB_OUTPUT
            echo "ingress=all" >> $GITHUB_OUTPUT
          fi

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Authorize Docker
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev

      - name: Build and Push Next.js image
        run: |-
          IMAGE_NAME="europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hygraph-showcase/nextjs:${{ github.sha }}"

          docker build \
            --secret id=sentry_auth_token,src=<(echo "${{ secrets.SENTRY_AUTH_TOKEN }}") \
            --build-arg NEXT_PUBLIC_HYGRAPH_CONTENT_ENDPOINT="${{ secrets.NEXT_PUBLIC_HYGRAPH_CONTENT_ENDPOINT }}" \
            --build-arg NEXT_PUBLIC_HYGRAPH_ALWAYS_DRAFT="${{ secrets.NEXT_PUBLIC_HYGRAPH_ALWAYS_DRAFT }}" \
            --build-arg NEXT_PUBLIC_SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}" \
            --build-arg NEXT_PUBLIC_SENTRY_DSN="${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}" \
            -t $IMAGE_NAME .

          docker push $IMAGE_NAME

      - name: Build and Push Grafana image
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: |
          IMAGE_NAME="europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hygraph-showcase/grafana:${{ github.sha }}"
          LATEST="europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hygraph-showcase/grafana:latest"

          docker build -f grafana/Dockerfile -t $IMAGE_NAME -t $LATEST .

          docker push $IMAGE_NAME
          docker push $LATEST

      - name: Deploy Next.js to Cloud Run (dev / PRs)
        id: deploy
        if: github.ref != 'refs/heads/main'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: ${{ steps.env.outputs.service }}
          region: 'europe-west3'
          image: 'europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hygraph-showcase/nextjs:${{ github.sha }}'
          ingress: ${{ steps.env.outputs.ingress }}
          tag: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'stable' }}
          no_traffic: ${{ github.event_name == 'pull_request' }}

      - name: Deploy Next.js to Cloud Run (production)
        if: github.ref == 'refs/heads/main'
        run: |
          gcloud run deploy "${{ steps.env.outputs.service }}" \
            --region="europe-west3" \
            --image="europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hygraph-showcase/nextjs:${{ github.sha }}" \
            --tag="stable" \
            --platform=managed \
            --quiet

      - name: Update Cloud Run Service Configuration
        run: |
          gcloud run services update "${{ steps.env.outputs.service }}" \
            --region="europe-west3" \
            --service-account="nextjs-run-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --ingress="${{ steps.env.outputs.ingress }}" \
            --quiet

      - name: Purge CDN Cache (production only)
        if: github.ref == 'refs/heads/main'
        run: |
          if gcloud compute url-maps describe hygraph-showcase-prod-url-map --global --quiet 2>/dev/null; then
            gcloud compute url-maps invalidate-cdn-cache hygraph-showcase-prod-url-map --path="/*"
          else
            echo "URL map not yet provisioned, skipping CDN purge"
          fi

      - name: Post PR Preview Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            if (url) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🚀 **Preview Deployment Ready!**\n\n**URL:** ${url}\n**Service:** ${{ steps.env.outputs.service }}\n**Revision:** ${{ steps.deploy.outputs.revision_name }}`
              });
            }
