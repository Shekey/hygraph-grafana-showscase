name: Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: 'read'
  id-token: 'write'      
  pull-requests: 'write' 

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Authorize Docker
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev

      - name: Build and Push Container
        run: |-
          IMAGE_NAME="europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hygraph-showcase/nextjs:${{ github.sha }}"
          
          docker build \
            --secret id=sentry_auth_token,src=<(echo "${{ secrets.SENTRY_AUTH_TOKEN }}") \
            --build-arg NEXT_PUBLIC_HYGRAPH_CONTENT_ENDPOINT="${{ secrets.NEXT_PUBLIC_HYGRAPH_CONTENT_ENDPOINT }}" \
            --build-arg NEXT_PUBLIC_HYGRAPH_ALWAYS_DRAFT="${{ secrets.NEXT_PUBLIC_HYGRAPH_ALWAYS_DRAFT }}" \
            --build-arg NEXT_PUBLIC_SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}" \
            --build-arg NEXT_PUBLIC_SENTRY_DSN="${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}" \
            -t $IMAGE_NAME .
          
          docker push $IMAGE_NAME

      - name: Deploy to Cloud Run
        id: deploy
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: 'hygraph-showcase'
          region: 'europe-west3'
          image: 'europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hygraph-showcase/nextjs:${{ github.sha }}'
          tag: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'stable' }}
          no_traffic: ${{ github.event_name == 'pull_request' }}
          env_vars: |
            NODE_ENV=production
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}

      - name: Output Rollback Instructions
        if: github.event_name != 'pull_request'
        run: |
          echo "✅ Production deployment complete"
          echo ""
          echo "Revision: ${{ steps.deploy.outputs.revision_name }}"
          echo "Service URL: ${{ steps.deploy.outputs.url }}"
          echo ""
          echo "To rollback to previous revision:"
          echo "gcloud run services update-traffic hygraph-showcase --to-revisions=PREVIOUS=100 --region=europe-west3"

      - name: Post PR Preview Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            if (url) {
              const prNumber = context.issue.number;
              const previewUrl = url.replace('https://', `https://pr-${prNumber}---`);
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🚀 **Preview Deployment Ready!**\n\n**URL:** ${previewUrl}\n**Revision:** ${{ steps.deploy.outputs.revision_name }}`
              });
            }