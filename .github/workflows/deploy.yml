name: Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev

      - name: Build and Push Next.js image
        run: |-
          IMAGE_NAME="europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hygraph-showcase/nextjs:${{ github.sha }}"

          docker build \
            --secret id=sentry_auth_token,src=<(echo "${{ secrets.SENTRY_AUTH_TOKEN }}") \
            --build-arg NEXT_PUBLIC_HYGRAPH_CONTENT_ENDPOINT="${{ secrets.NEXT_PUBLIC_HYGRAPH_CONTENT_ENDPOINT }}" \
            --build-arg NEXT_PUBLIC_HYGRAPH_ALWAYS_DRAFT="${{ secrets.NEXT_PUBLIC_HYGRAPH_ALWAYS_DRAFT }}" \
            --build-arg NEXT_PUBLIC_SITE_URL="${{ secrets.NEXT_PUBLIC_SITE_URL }}" \
            --build-arg NEXT_PUBLIC_SENTRY_DSN="${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}" \
            -t $IMAGE_NAME .

          docker push $IMAGE_NAME

      - name: Build and Push Grafana image
        run: |
          IMAGE_NAME="europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hygraph-showcase/grafana:${{ github.sha }}"

          docker build -f grafana/Dockerfile -t $IMAGE_NAME .
          docker push $IMAGE_NAME

      - name: Build and Push OTel Collector image
        run: |
          IMAGE_NAME="europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hygraph-showcase/otel-collector:${{ github.sha }}"

          docker build -f otel-collector/Dockerfile -t $IMAGE_NAME otel-collector/
          docker push $IMAGE_NAME

      - name: Build and Push Prometheus image
        run: |
          IMAGE_NAME="europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hygraph-showcase/prometheus:${{ github.sha }}"

          docker build -f prometheus/Dockerfile -t $IMAGE_NAME prometheus/
          docker push $IMAGE_NAME

  terraform:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Cloud Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "name=prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "name=dev" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.GCP_PROJECT_ID }}-terraform-state" \
            -backend-config="prefix=terraform/state/${{ steps.env.outputs.name }}"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="environments/${{ steps.env.outputs.name }}.tfvars" \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="project_number=${{ secrets.GCP_PROJECT_NUMBER }}" \
            -var="alert_notification_email=${{ secrets.ALERT_EMAIL }}" \
            -var="hygraph_endpoint=${{ secrets.NEXT_PUBLIC_HYGRAPH_CONTENT_ENDPOINT }}" \
            -var="sentry_dsn=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}" \
            -var="image_tag=${{ github.sha }}" \
            -var="grafana_image_tag=${{ github.sha }}" \
            -var="otel_collector_image_tag=${{ github.sha }}" \
            -var="prometheus_image_tag=${{ github.sha }}" \
            -out=tfplan \
            -no-color
          echo "success=true" >> $GITHUB_OUTPUT

      - name: Generate Plan Output
        if: github.event_name == 'pull_request'
        id: planoutput
        run: |
          terraform show -no-color tfplan > tfplan.txt

      - name: Comment PR with Plan
        if: github.event_name == 'pull_request' && steps.plan.outputs.success == 'true'
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT: ${{ steps.env.outputs.name }}
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/tfplan.txt', 'utf8');
            const truncatedPlan = plan.length > 65000 ? plan.substring(0, 65000) + '\n... (truncated)' : plan;
            const envName = process.env.PLAN_OUTPUT;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan - ${envName}\n\n\`\`\`\n${truncatedPlan}\n\`\`\`\n\n*Generated by deploy workflow*`
            });

      - name: Populate GCP Secrets
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && steps.plan.outputs.success == 'true'
        run: |
          ENV="${{ steps.env.outputs.name }}"
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"

          # Apply only the secrets module first so containers exist before we add versions
          terraform apply \
            -auto-approve \
            -target=module.secrets \
            -var-file="environments/${ENV}.tfvars" \
            -var="project_id=${PROJECT}" \
            -var="project_number=${{ secrets.GCP_PROJECT_NUMBER }}" \
            -var="alert_notification_email=${{ secrets.ALERT_EMAIL }}" \
            -var="hygraph_endpoint=${{ secrets.NEXT_PUBLIC_HYGRAPH_CONTENT_ENDPOINT }}" \
            -var="sentry_dsn=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}" \
            -var="image_tag=${{ github.sha }}" \
            -var="grafana_image_tag=${{ github.sha }}" \
            -var="otel_collector_image_tag=${{ github.sha }}" \
            -var="prometheus_image_tag=${{ github.sha }}"

          # Populate each secret only if it has no version yet (idempotent)
          populate_secret() {
            local secret_id="$1"
            local value="$2"
            if ! gcloud secrets versions access latest \
                --secret="$secret_id" \
                --project="$PROJECT" &>/dev/null; then
              printf '%s' "$value" | gcloud secrets versions add "$secret_id" \
                --data-file=- --project="$PROJECT"
              echo "Populated: $secret_id"
            else
              echo "Already has version: $secret_id"
            fi
          }

          populate_secret "${ENV}-HYGRAPH_PREVIEW_TOKEN"       "${{ secrets.HYGRAPH_PREVIEW_TOKEN }}"
          populate_secret "${ENV}-HYGRAPH_PREVIEW_SECRET"      "${{ secrets.HYGRAPH_PREVIEW_SECRET }}"
          populate_secret "${ENV}-SENTRY_AUTH_TOKEN"           "${{ secrets.SENTRY_AUTH_TOKEN }}"
          populate_secret "${ENV}-GF_SECURITY_ADMIN_PASSWORD"  "${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}"

      - name: Terraform Apply
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && steps.plan.outputs.success == 'true'
        run: |
          terraform apply \
            -auto-approve \
            tfplan

      - name: Purge CDN Cache (production only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          if gcloud compute url-maps describe hygraph-showcase-prod-url-map --global --quiet 2>/dev/null; then
            gcloud compute url-maps invalidate-cdn-cache hygraph-showcase-prod-url-map --path="/*"
          else
            echo "URL map not yet provisioned, skipping CDN purge"
          fi
