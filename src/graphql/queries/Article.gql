query GetArticles {
  articles(stage: DRAFT, orderBy: publishedDate_DESC, first: 50) {
    id
    slug
    title
    category
    publishedDate
    readTime
    summary
    image {
      url
      width
      height
    }
  }
}

query GetArticle($slug: String!, $segmentId: ID) {
  article(where: { slug: $slug }, stage: DRAFT) {
    id
    slug
    title
    category
    publishedDate
    readTime
    summary
    image {
      url
      width
      height
    }
    content {
      ... on ArticleParagraph {
        __typename
        id
        paragraphText: text {
          html
        }
      }
      ... on ArticleImageSection {
        __typename
        id
        image {
          url
          width
          height
        }
        caption
        imageSectionText: text {
          html
        }
      }
      ... on ArticleProductCallout {
        __typename
        id
        headline
        calloutText: text {
          html
        }
        product {
          id
          slug
          name
          image {
            url
            width
            height
          }
        }
      }
    }
    variants(where: { segments_some: { id: $segmentId } }) {
      title
      summary
      content {
        ... on ArticleParagraph {
          __typename
          id
          paragraphText: text {
            html
          }
        }
        ... on ArticleImageSection {
          __typename
          id
          image {
            url
            width
            height
          }
          caption
          imageSectionText: text {
            html
          }
        }
        ... on ArticleProductCallout {
          __typename
          id
          headline
          calloutText: text {
            html
          }
          product {
            id
            slug
            name
            image {
              url
              width
              height
            }
          }
        }
      }
    }
  }
}
