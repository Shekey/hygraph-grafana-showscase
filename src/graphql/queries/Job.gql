query GetJobs {
  jobs(stage: PUBLISHED, first: 20) {
    id
    slug
    title
    department
    location
    jobType
    summary
  }
}

query GetJob($slug: String!) {
  job(where: { slug: $slug }, stage: PUBLISHED) {
    id
    slug
    title
    department
    location
    jobType
    summary
    description {
      html
    }
    responsibilities
    requirements
    niceToHave
  }
}
